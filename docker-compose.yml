services:
  postgres:
    image: postgres:17
    container_name: blazecrawl-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: blazecrawl
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - blazecrawl-network

  redis:
    image: redis:latest
    container_name: blazecrawl-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - blazecrawl-network

  mailhog:
    image: mailhog/mailhog
    container_name: blazecrawl-mailhog
    ports:
      - "1025:1025" # SMTP server
      - "8025:8025" # Web UI
    networks:
      - blazecrawl-network

volumes:
  postgres-data:
  redis-data:

networks:
  blazecrawl-network:
    driver: bridge
